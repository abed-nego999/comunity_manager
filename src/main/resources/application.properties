spring.application.name=comunity_manager
server.port=8080

# ── Base de datos H2 en modo fichero ─────────────────────────────────────────
spring.datasource.url=jdbc:h2:file:./data/social-manager
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=admin
spring.datasource.password=admin
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# ── Seed de tablas auxiliares (data.sql) ─────────────────────────────────────
# defer asegura que Hibernate crea las tablas antes de que corra data.sql
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ── Almacenamiento de ficheros multimedia ─────────────────────────────────────
storage.base-path=./storage

# ── Clave AES para cifrado de credenciales ───────────────────────────────────
# En producción, establecer AES_SECRET_KEY en el entorno (.env)
app.aes-secret-key=${AES_SECRET_KEY:dev-only-key-change-in-productio}

# ─────────────────────────────────────────────
# META GRAPH API — Fase 2
# ─────────────────────────────────────────────

# IDs de los activos de Meta — los tokens van en .env cifrados en BBDD
# Page ID: identificador numérico de la página de Facebook
meta.facebook.page-id=${META_PAGE_ID}

# Instagram Business Account ID: identificador de la cuenta de Instagram
# vinculada a la página de Facebook
meta.instagram.business-account-id=${META_INSTAGRAM_ACCOUNT_ID}

# Page Access Token: token de acceso a la página de Facebook (desde .env)
meta.page-access-token=${META_PAGE_ACCESS_TOKEN:}
