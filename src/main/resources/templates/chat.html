<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}"
      lang="es">
<head>
    <title>Chat</title>
    <style>
        /* ── Layout del chat ─────────────────────────────────────────────────── */
        .chat-wrapper {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            background: white;
        }

        /* ── Barra superior: selector de evento ─────────────────────────────── */
        .chat-topbar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            background: white;
            border-bottom: 1px solid #e4e6eb;
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        .chat-topbar select {
            height: 34px;
            border: 1px solid #ccd0d5;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 13px;
            font-family: inherit;
            background: white;
            color: #1c1e21;
            cursor: pointer;
            outline: none;
            min-width: 220px;
        }

        .chat-topbar select:focus { border-color: #7c6af7; }
        .chat-topbar select:disabled { background: #f0f2f5; color: #65676b; }

        .btn-nuevo-evento {
            height: 34px;
            background: #7c6af7;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 0 14px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background .15s;
            white-space: nowrap;
        }

        .btn-nuevo-evento:hover { background: #6a59e0; }

        .topbar-info {
            font-size: 12px;
            color: #65676b;
            margin-left: auto;
        }

        /* ── Placeholder ─────────────────────────────────────────────────────── */
        .chat-placeholder {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 12px;
            color: #65676b;
            background: #f8f8f6;
        }

        .chat-placeholder svg { opacity: .35; }
        .chat-placeholder p { font-size: 15px; }

        /* ── Área de mensajes ────────────────────────────────────────────────── */
        #mensajes {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #f8f8f6;
        }

        .mensaje {
            max-width: 75%;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .mensaje.usuario { align-self: flex-end; }
        .mensaje.claude  { align-self: flex-start; }

        .mensaje-burbuja {
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .mensaje.usuario .mensaje-burbuja {
            background: #7c6af7;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .mensaje.claude .mensaje-burbuja {
            background: white;
            color: #1c1e21;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 3px rgba(0,0,0,.1);
        }

        .mensaje-meta {
            font-size: 11px;
            color: #65676b;
            padding: 0 4px;
        }

        .mensaje.usuario .mensaje-meta { text-align: right; }

        /* ── Chips adjunto en burbujas ────────────────────────────────────────── */
        .mensaje-adjuntos {
            display: flex;
            flex-direction: column;
            gap: 3px;
            margin-top: 5px;
            padding-top: 5px;
            border-top: 1px solid rgba(255,255,255,.2);
        }
        .mensaje.claude .mensaje-adjuntos { border-top-color: #e4e6eb; }

        .adjunto-chip {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            border-radius: 6px;
            padding: 3px 8px;
            max-width: 220px;
        }
        .mensaje.usuario .adjunto-chip { background: rgba(255,255,255,.18); color: white; }
        .mensaje.claude  .adjunto-chip { background: #f0f2f5; color: #1c1e21; }

        .adjunto-chip a {
            color: inherit;
            text-decoration: none;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 190px;
            display: inline-block;
        }
        .adjunto-chip a:hover { text-decoration: underline; }

        .adjunto-chip-nombre {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 190px;
        }

        /* ── Miniatura de imagen en burbujas de chat ──────────────────────────── */
        .adjunto-img-thumb {
            max-width: 160px;
            max-height: 120px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            display: block;
            margin-top: 4px;
        }
        .adjunto-img-thumb:hover { opacity: .85; }

        /* ── Badge publicaciones ─────────────────────────────────────────────── */
        .publicaciones-badge {
            background: #f0eeff;
            border: 1px solid #d4ccff;
            color: #7c6af7;
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            align-self: flex-start;
            margin-top: 2px;
        }

        /* ── Input ───────────────────────────────────────────────────────────── */
        .input-area {
            border-top: 1px solid #e4e6eb;
            padding: 12px 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: flex-end;
            flex-shrink: 0;
            background: white;
        }

        .input-fila {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            width: 100%;
        }

        #mensajeInput {
            flex: 1;
            border: 1px solid #ccd0d5;
            border-radius: 20px;
            padding: 10px 16px;
            font-size: 14px;
            resize: none;
            outline: none;
            max-height: 120px;
            line-height: 1.4;
            font-family: inherit;
        }

        #mensajeInput:focus { border-color: #7c6af7; }
        #mensajeInput:disabled { background: #f0f2f5; }

        #enviarBtn {
            background: #7c6af7;
            color: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background .15s;
        }

        #enviarBtn:hover:not(:disabled) { background: #6a59e0; }
        #enviarBtn:disabled { background: #bec3c9; cursor: not-allowed; }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin .7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Chip de fichero pendiente en el área de composición ─────────────── */
        .pending-chip {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #f0eeff;
            border: 1px solid #d4ccff;
            border-radius: 8px;
            padding: 5px 10px;
            font-size: 12px;
            color: #7c6af7;
            width: 100%;
        }
        .pending-chip-nombre {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .pending-chip-clear {
            background: transparent;
            border: none;
            color: #7c6af7;
            cursor: pointer;
            font-size: 17px;
            line-height: 1;
            padding: 0 2px;
            flex-shrink: 0;
        }
        .pending-chip-clear:hover { color: #e41e3f; }

        /* ── Botón clip adjunto ──────────────────────────────────────────────── */
        .btn-clip {
            background: transparent;
            border: none;
            color: #65676b;
            cursor: pointer;
            padding: 6px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background .15s, color .15s;
        }
        .btn-clip:hover:not(:disabled) { background: #f0f2f5; color: #7c6af7; }
        .btn-clip:disabled { opacity: .4; cursor: not-allowed; }

        /* ── Contador de adjuntos del evento ─────────────────────────────────── */
        .adjuntos-panel-wrapper {
            position: relative;
        }

        .btn-adjuntos-contador {
            height: 28px;
            background: #f0eeff;
            color: #7c6af7;
            border: 1px solid #d4ccff;
            border-radius: 14px;
            padding: 0 12px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: background .15s;
            white-space: nowrap;
        }
        .btn-adjuntos-contador:hover { background: #e4deff; }

        /* ── Panel desplegable de adjuntos ───────────────────────────────────── */
        .adjuntos-panel {
            position: absolute;
            top: calc(100% + 6px);
            right: 0;
            background: white;
            border: 1px solid #e4e6eb;
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0,0,0,.12);
            min-width: 260px;
            max-width: 340px;
            max-height: 260px;
            overflow-y: auto;
            z-index: 50;
            padding: 4px 0;
        }

        .adjuntos-panel-vacio {
            padding: 12px 16px;
            font-size: 12px;
            color: #65676b;
        }

        .adjunto-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            font-size: 12px;
            color: #1c1e21;
            border-bottom: 1px solid #f0f2f5;
        }
        .adjunto-item:last-child { border-bottom: none; }
        .adjunto-icono { color: #7c6af7; flex-shrink: 0; }
        .adjunto-nombre {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .adjunto-nombre a {
            color: #1c1e21;
            text-decoration: none;
        }
        .adjunto-nombre a:hover { text-decoration: underline; color: #7c6af7; }
        .btn-eliminar-adjunto {
            background: transparent;
            border: none;
            color: #bec3c9;
            cursor: pointer;
            padding: 2px 5px;
            border-radius: 4px;
            font-size: 14px;
            line-height: 1;
            transition: color .15s;
            flex-shrink: 0;
        }
        .btn-eliminar-adjunto:hover { color: #e41e3f; }

        /* ── Modal nuevo evento ──────────────────────────────────────────────── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .modal {
            background: white;
            border-radius: 12px;
            padding: 24px;
            width: 400px;
            max-width: 95vw;
            box-shadow: 0 8px 32px rgba(0,0,0,.2);
        }

        .modal h2 { font-size: 18px; margin-bottom: 16px; }

        .modal label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #65676b;
        }

        .modal input, .modal textarea {
            width: 100%;
            border: 1px solid #ccd0d5;
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 14px;
            font-family: inherit;
            margin-bottom: 12px;
            outline: none;
        }

        .modal input:focus, .modal textarea:focus { border-color: #7c6af7; }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 4px;
        }

        .btn-cancelar {
            background: #e4e6eb;
            color: #1c1e21;
            border: none;
            border-radius: 6px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }

        .btn-crear {
            background: #7c6af7;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }

        .btn-crear:hover { background: #6a59e0; }

        /* ── Toast ───────────────────────────────────────────────────────────── */
        #toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(60px);
            background: #1c1e21;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            opacity: 0;
            transition: all .3s;
            z-index: 200;
            white-space: nowrap;
        }

        #toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ── Botón editar evento ─────────────────────────────────────────────── */
        .btn-editar-evento {
            height: 34px;
            background: white;
            color: #7c6af7;
            border: 1.5px solid #7c6af7;
            border-radius: 6px;
            padding: 0 14px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all .15s;
            white-space: nowrap;
        }
        .btn-editar-evento:hover { background: #f0eeff; }

        /* ── Typing indicator (tres puntos animados) ─────────────────────────── */
        .typing-dots {
            display: inline-flex;
            gap: 5px;
            align-items: center;
            padding: 2px 4px;
        }
        .typing-dots span {
            width: 8px;
            height: 8px;
            background: #bec3c9;
            border-radius: 50%;
            animation: dot-bounce 1.2s infinite ease-in-out;
        }
        .typing-dots span:nth-child(1) { animation-delay: 0s; }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dot-bounce {
            0%, 60%, 100% { transform: translateY(0); opacity: .4; }
            30% { transform: translateY(-5px); opacity: 1; }
        }

        /* ── Placeholder animado de subida de adjunto ────────────────────────── */
        .adjunto-upload-ph {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            background: #e4e6eb;
            animation: pulse-ph 1.5s ease-in-out infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-top: 4px;
        }
        .adjunto-upload-ph.error {
            background: #fff0f0;
            border: 1px solid #f5c6cb;
            animation: none;
        }
        .adjunto-upload-ph.error::after {
            content: '⚠️';
            font-size: 24px;
        }

        @keyframes pulse-ph {
            0%, 100% { opacity: 1; }
            50% { opacity: .45; }
        }

        .adjunto-error-msg {
            font-size: 11px;
            color: #e41e3f;
            margin-top: 2px;
        }

        /* ── Badge "Sin respuesta" + botón Reintentar ────────────────────────── */
        .sin-respuesta-wrap {
            align-self: flex-end;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: -4px;
            margin-bottom: 4px;
        }
        .badge-sin-resp {
            background: #fff3cd;
            border: 1px solid #ffc107;
            color: #856404;
            border-radius: 10px;
            padding: 2px 10px;
            font-size: 11px;
            font-weight: 600;
        }
        .btn-reintentar {
            background: #7c6af7;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 3px 12px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: background .15s;
        }
        .btn-reintentar:hover { background: #6a59e0; }

        /* ── Indicador "Procesando imagen..." ──────────────────────────────── */
        .procesando-indicator {
            align-self: flex-start;
            background: #f0eeff;
            border: 1px solid #d4ccff;
            color: #7c6af7;
            border-radius: 12px;
            padding: 7px 14px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .procesando-indicator .spinner {
            width: 14px;
            height: 14px;
            border-color: rgba(124,106,247,.3);
            border-top-color: #7c6af7;
        }

        /* ── Chips de ficheros pendientes (multi-fichero) ──────────────────── */
        #pendingFilesContainer {
            display: none;
            flex-direction: column;
            gap: 4px;
            width: 100%;
        }
    </style>
</head>
<body>

<!-- ── Contenido principal ────────────────────────────────────────────────── -->
<div layout:fragment="content" class="chat-wrapper">

    <!-- Barra superior: selector de evento -->
    <div class="chat-topbar">
        <select id="eventoSelect" disabled>
            <option value="">— Selecciona un evento —</option>
        </select>
        <button class="btn-nuevo-evento" id="nuevoEventoBtn" style="display:none" type="button">
            + Nuevo evento
        </button>
        <button class="btn-editar-evento" id="editarEventoBtn" style="display:none" type="button">
            Editar evento
        </button>
        <span class="topbar-info" id="topbarInfo" style="display:none"></span>
        <!-- Contador de adjuntos del evento -->
        <div class="adjuntos-panel-wrapper" id="adjuntosPanelWrapper" style="display:none">
            <button class="btn-adjuntos-contador" id="adjuntosContadorBtn" type="button">
                📎 <span id="adjuntosCount">0</span> ficheros
            </button>
            <div class="adjuntos-panel" id="adjuntosPanel" style="display:none">
                <div id="adjuntosLista"></div>
            </div>
        </div>
    </div>

    <!-- Placeholder cuando no hay evento seleccionado -->
    <div class="chat-placeholder" id="chatPlaceholder">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <p id="placeholderTexto">Selecciona un cliente en la barra lateral para comenzar</p>
    </div>

    <!-- Área de chat activa -->
    <div id="chatActivo" style="display:none; flex:1; flex-direction:column; overflow:hidden;">
        <div id="mensajes"></div>
        <div class="input-area">
            <!-- Chips de ficheros pendientes (multi-fichero) -->
            <div id="pendingFilesContainer"></div>
            <!-- Fila principal: clip + textarea + enviar -->
            <div class="input-fila">
                <button id="clipBtn" class="btn-clip" type="button" title="Adjuntar ficheros al mensaje" disabled>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                    </svg>
                </button>
                <input type="file" id="fileInputContexto" style="display:none" multiple
                       accept=".jpg,.jpeg,.png,.gif,.webp,.pdf,image/jpeg,image/png,image/gif,image/webp,application/pdf">
                <textarea id="mensajeInput"
                          rows="1"
                          placeholder="Escribe tu petición a Claude..."></textarea>
                <button id="enviarBtn" type="button" title="Enviar (Enter)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- ── Modal nuevo evento (dentro del fragmento para que Thymeleaf lo incluya) -->
    <div class="modal-overlay" id="modalNuevoEvento" style="display:none">
        <div class="modal">
            <h2>Nuevo evento</h2>
            <label for="eventoNombre">Nombre *</label>
            <input type="text" id="eventoNombre" placeholder="Ej: Milonga de verano">
            <label for="eventoFecha">Fecha del evento</label>
            <input type="date" id="eventoFecha">
            <label for="eventoDescripcion">Descripción</label>
            <textarea id="eventoDescripcion" rows="3" placeholder="Descripción opcional..."></textarea>
            <div class="modal-actions">
                <button class="btn-cancelar" id="cancelarEvento">Cancelar</button>
                <button class="btn-crear" id="crearEvento">Crear evento</button>
            </div>
        </div>
    </div>

    <!-- ── Modal editar evento ────────────────────────────────────────────── -->
    <div class="modal-overlay" id="modalEditarEvento" style="display:none">
        <div class="modal">
            <h2>Editar evento</h2>
            <label for="editNombre">Nombre *</label>
            <input type="text" id="editNombre" placeholder="Nombre del evento">
            <label for="editFecha">Fecha del evento</label>
            <input type="date" id="editFecha">
            <label for="editDescripcion">Descripción</label>
            <textarea id="editDescripcion" rows="3" placeholder="Descripción..."></textarea>
            <div class="modal-actions">
                <button class="btn-cancelar" id="cancelarEditar">Cancelar</button>
                <button class="btn-crear" id="guardarEditar">Guardar cambios</button>
            </div>
        </div>
    </div>

    <div id="toast"></div>

</div>

<!-- ── Scripts del chat ───────────────────────────────────────────────────── -->
<th:block layout:fragment="scripts">
<script>
    // ── Estado ─────────────────────────────────────────────────────────────────
    let clienteIdActivo = sessionStorage.getItem('clienteActivoId') || localStorage.getItem('clienteActivoId') || null;
    let eventoIdActivo  = null;
    let eventoActivo    = null; // datos completos del evento seleccionado
    let pendingFiles    = []; // Ficheros pendientes de subir junto al próximo mensaje

    // Parámetros URL: vienen de redirect desde feedback en /eventos
    const _urlParams               = new URLSearchParams(window.location.search);
    const _eventoIdParam           = _urlParams.get('eventoId');
    let   mensajePendienteAutoEnvio = _urlParams.get('feedback') || _urlParams.get('mensaje') || null;

    const eventoSelect          = document.getElementById('eventoSelect');
    const nuevoEventoBtn        = document.getElementById('nuevoEventoBtn');
    const editarEventoBtn       = document.getElementById('editarEventoBtn');
    const chatPlaceholder       = document.getElementById('chatPlaceholder');
    const placeholderTexto      = document.getElementById('placeholderTexto');
    const chatActivo            = document.getElementById('chatActivo');
    const mensajesDiv           = document.getElementById('mensajes');
    const mensajeInput          = document.getElementById('mensajeInput');
    const enviarBtn             = document.getElementById('enviarBtn');
    const topbarInfo            = document.getElementById('topbarInfo');
    const clipBtn               = document.getElementById('clipBtn');
    const fileInputContexto     = document.getElementById('fileInputContexto');
    const adjuntosPanelWrapper  = document.getElementById('adjuntosPanelWrapper');
    const adjuntosContadorBtn   = document.getElementById('adjuntosContadorBtn');
    const adjuntosCount         = document.getElementById('adjuntosCount');
    const adjuntosPanel         = document.getElementById('adjuntosPanel');
    const adjuntosLista         = document.getElementById('adjuntosLista');
    const pendingFilesContainer = document.getElementById('pendingFilesContainer');

    // ── Gestión del cliente global ─────────────────────────────────────────────
    function onClienteChanged(clienteId) {
        clienteIdActivo = clienteId || null;
        eventoIdActivo  = null;
        eventoActivo    = null;
        eventoSelect.innerHTML = '<option value="">— Selecciona un evento —</option>';
        eventoSelect.disabled = true;
        nuevoEventoBtn.style.display = 'none';
        editarEventoBtn.style.display = 'none';
        topbarInfo.style.display = 'none';
        ocultarChat();

        if (!clienteIdActivo) {
            placeholderTexto.textContent = 'Selecciona un cliente en la barra lateral para comenzar';
            return;
        }

        placeholderTexto.textContent = 'Selecciona o crea un evento para comenzar';
        cargarEventos(clienteIdActivo);
    }

    // Escuchar cambios del selector global del sidebar
    document.addEventListener('clienteGlobalChanged', (e) => {
        onClienteChanged(e.detail.clienteId);
    });

    // Carga inicial: si ya hay cliente guardado el sidebar ya disparó el evento
    // pero puede que no, así que lo comprobamos
    if (clienteIdActivo) {
        onClienteChanged(clienteIdActivo);
    }

    // ── Carga de eventos ───────────────────────────────────────────────────────
    async function cargarEventos(clienteId) {
        try {
            const eventos = await fetchJson(`/api/v1/eventos?clienteId=${clienteId}`);
            eventos.forEach(e => {
                const opt = document.createElement('option');
                opt.value = e.id;
                opt.textContent = e.nombre + (e.fechaEvento ? ` (${e.fechaEvento})` : '');
                eventoSelect.appendChild(opt);
            });
            eventoSelect.disabled = false;
            nuevoEventoBtn.style.display = 'block';

            // Auto-selección desde URL (?eventoId=...) — viene de redirect de feedback
            if (_eventoIdParam && eventoSelect.querySelector(`option[value="${_eventoIdParam}"]`)) {
                eventoSelect.value = _eventoIdParam;
                eventoSelect.dispatchEvent(new Event('change'));
            } else {
                // Restaurar último evento activo desde sessionStorage
                const sessionEventoId = sessionStorage.getItem('eventoActivoId');
                if (sessionEventoId && eventoSelect.querySelector(`option[value="${sessionEventoId}"]`)) {
                    eventoSelect.value = sessionEventoId;
                    eventoSelect.dispatchEvent(new Event('change'));
                }
            }
        } catch (err) {
            mostrarToast('Error al cargar eventos: ' + err.message);
        }
    }

    // ── Selección de evento ────────────────────────────────────────────────────
    eventoSelect.addEventListener('change', async () => {
        eventoIdActivo = eventoSelect.value || null;
        eventoActivo   = null;
        // Persistir en sessionStorage para restaurar al navegar entre vistas
        if (eventoIdActivo) sessionStorage.setItem('eventoActivoId', eventoIdActivo);
        else                sessionStorage.removeItem('eventoActivoId');
        ocultarChat();
        editarEventoBtn.style.display = 'none';
        clipBtn.disabled = true;
        if (!eventoIdActivo) { topbarInfo.style.display = 'none'; return; }

        try {
            const [mensajes, eventoData] = await Promise.all([
                fetchJson(`/api/v1/eventos/${eventoIdActivo}/conversacion`),
                fetchJson(`/api/v1/eventos/${eventoIdActivo}`)
            ]);

            eventoActivo = eventoData;
            mostrarChatActivo();
            mensajesDiv.innerHTML = '';
            mensajes.forEach(m => agregarMensajeAlChat(m.rol.nombre, m.contenido, m.enviadoEn, m.adjuntos || []));

            // Detectar mensaje de usuario sin respuesta (Claude no llegó a responder)
            if (mensajes.length > 0) {
                const ultimo = mensajes[mensajes.length - 1];
                if (ultimo.rol.nombre === 'Usuario') {
                    const lastEl = mensajesDiv.lastElementChild;
                    if (lastEl) agregarBadgeSinRespuesta(lastEl, ultimo.contenido);
                }
            }

            scrollAlFinal();
            topbarInfo.textContent = mensajes.length + ' mensaje' + (mensajes.length !== 1 ? 's' : '');
            topbarInfo.style.display = 'block';
            editarEventoBtn.style.display = 'block';
            clipBtn.disabled = false;
            await cargarAdjuntosEvento(eventoIdActivo);

            // Auto-envío de mensaje pendiente (viene de feedback en /eventos)
            if (mensajePendienteAutoEnvio) {
                const texto = mensajePendienteAutoEnvio;
                mensajePendienteAutoEnvio = null;
                window.history.replaceState({}, '', '/chat');
                mensajeInput.value = texto;
                await enviarMensaje();
            }
        } catch (err) {
            mostrarToast('Error al cargar conversación: ' + err.message);
        }
    });

    // ── Envío de mensaje ───────────────────────────────────────────────────────
    enviarBtn.addEventListener('click', enviarMensaje);

    mensajeInput.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviarMensaje(); }
    });

    mensajeInput.addEventListener('input', () => {
        mensajeInput.style.height = 'auto';
        mensajeInput.style.height = Math.min(mensajeInput.scrollHeight, 120) + 'px';
    });

    async function enviarMensaje() {
        const contenido = mensajeInput.value.trim();
        if (!contenido || !eventoIdActivo) return;

        mensajeInput.value = '';
        mensajeInput.style.height = 'auto';

        const archivosEnTurno = [...pendingFiles];
        limpiarPendingFiles();
        setBloqueado(true);

        // ── Fase 1: subir ficheros secuencialmente con procesamiento previo ──
        const adjuntosSubidos = [];
        if (archivosEnTurno.length > 0) {
            const procesandoId = mostrarProcesando(archivosEnTurno.length);
            scrollAlFinal();

            for (const archivo of archivosEnTurno) {
                try {
                    const formData = new FormData();
                    formData.append('fichero', archivo);
                    // Sin mensajeId: el backend procesa descripcionIa antes de responder
                    const adjunto = await fetchMultipart(`/api/v1/eventos/${eventoIdActivo}/adjuntos`, formData);
                    adjuntosSubidos.push(adjunto);
                } catch (uploadErr) {
                    quitarProcesando(procesandoId);
                    mostrarToast(`Error al subir "${archivo.name}": ${uploadErr.message}`);
                    setBloqueado(false);
                    mensajeInput.focus();
                    return; // No continuar si falla alguna subida
                }
            }

            quitarProcesando(procesandoId);
            await cargarAdjuntosEvento(eventoIdActivo);
        }

        // ── Fase 2: mostrar burbuja del usuario con adjuntos ya subidos ──────
        agregarMensajeAlChat('Usuario', contenido, new Date().toISOString(), adjuntosSubidos);
        scrollAlFinal();

        // ── Fase 3: enviar mensaje a Claude ───────────────────────────────────
        const typingId = mostrarTyping();

        // Añadir referencias explícitas a los adjuntos subidos en este turno
        let contenidoEnviado = contenido;
        if (adjuntosSubidos.length > 0) {
            const refs = adjuntosSubidos
                .map(a => `[Adjunto subido: ${a.nombreFichero} | ID: ${a.id}]`)
                .join('\n');
            contenidoEnviado = contenido + '\n' + refs;
        }

        try {
            const respuesta = await fetchJson(`/api/v1/eventos/${eventoIdActivo}/conversacion`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contenido: contenidoEnviado })
            });

            quitarTyping(typingId);
            agregarMensajeAlChat('Claude', respuesta.mensaje.contenido, respuesta.mensaje.enviadoEn, []);

            if (respuesta.publicacionesCreadas && respuesta.publicacionesCreadas.length > 0) {
                agregarBadgePublicaciones(respuesta.publicacionesCreadas.length);
            }

            scrollAlFinal();
        } catch (err) {
            quitarTyping(typingId);
            mostrarToast('Error al enviar mensaje: ' + err.message);
        } finally {
            setBloqueado(false);
            mensajeInput.focus();
        }
    }

    // ── Helpers de chat ────────────────────────────────────────────────────────

    /**
     * Añade un mensaje al área de chat.
     * adjuntos: array de AdjuntoResponse (histórico) o [{_pendiente, nombre, mime}] (turno actual).
     * Devuelve el elemento DOM del mensaje para poder actualizarlo después.
     */
    function agregarMensajeAlChat(rol, contenido, timestamp, adjuntos) {
        const esClaude = rol === 'Claude';
        const div = document.createElement('div');
        div.className = 'mensaje ' + (esClaude ? 'claude' : 'usuario');
        const hora = timestamp ? formatearHora(timestamp) : '';

        let adjuntosHtml = '';
        if (adjuntos && adjuntos.length > 0) {
            const chips = adjuntos.map(adj => {
                if (adj._pendiente) {
                    if (esImagen(adj.mime)) {
                        // Placeholder animado 80x80 para imágenes mientras se sube
                        return `<div class="adjunto-upload-ph" data-pending title="${escapeHtml(adj.nombre)}"></div>`;
                    }
                    // Chip de texto para PDFs con indicador de carga
                    const icono = esPdf(adj.mime) ? '📄' : '🖼';
                    return `<span class="adjunto-chip" data-pending title="${escapeHtml(adj.nombre)}">
                        ${icono} <span class="adjunto-chip-nombre">${escapeHtml(adj.nombre)}</span>
                    </span>`;
                } else if (esImagen(adj.tipoMime)) {
                    // Miniatura clicable para imágenes
                    const url = '/api/v1/ficheros?ruta=' + encodeURIComponent(adj.rutaFichero);
                    return `<a href="${url}" target="_blank" rel="noopener noreferrer" style="display:inline-block">
                        <img src="${url}" alt="${escapeHtml(adj.nombreFichero)}"
                             title="${escapeHtml(adj.nombreFichero)}" class="adjunto-img-thumb">
                    </a>`;
                } else {
                    const icono = esPdf(adj.tipoMime) ? '📄' : '🖼';
                    return `<span class="adjunto-chip">
                        ${icono} <a href="/api/v1/ficheros?ruta=${encodeURIComponent(adj.rutaFichero)}"
                            target="_blank" rel="noopener noreferrer"
                            class="adjunto-chip-nombre" title="${escapeHtml(adj.nombreFichero)}">${escapeHtml(adj.nombreFichero)}</a>
                    </span>`;
                }
            }).join('');
            adjuntosHtml = `<div class="mensaje-adjuntos">${chips}</div>`;
        }

        div.innerHTML = `
            <div class="mensaje-burbuja">${escapeHtml(contenido)}${adjuntosHtml}</div>
            <div class="mensaje-meta">${esClaude ? 'Claude' : 'Tú'}${hora ? ' · ' + hora : ''}</div>
        `;
        mensajesDiv.appendChild(div);
        return div;
    }

    function agregarBadgeSinRespuesta(mensajeEl, contenido) {
        const wrap = document.createElement('div');
        wrap.className = 'sin-respuesta-wrap';
        wrap.innerHTML = `
            <span class="badge-sin-resp">Sin respuesta</span>
            <button class="btn-reintentar" type="button">Reintentar</button>`;
        wrap.querySelector('.btn-reintentar').addEventListener('click', async () => {
            wrap.remove();
            mensajeInput.value = contenido;
            await enviarMensaje();
        });
        mensajeEl.after(wrap);
    }

    function agregarBadgePublicaciones(cantidad) {
        const div = document.createElement('div');
        div.className = 'publicaciones-badge';
        const pub  = cantidad > 1 ? 'publicaciones' : 'publicación';
        const crea = cantidad > 1 ? 'creadas' : 'creada';
        div.innerHTML = `
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
            </svg>
            ✓ ${cantidad} ${pub} ${crea} —
            <a href="/eventos?eventoId=${encodeURIComponent(eventoIdActivo)}"
               style="color:#7c6af7;font-weight:700;text-decoration:none;"
               onmouseover="this.style.textDecoration='underline'"
               onmouseout="this.style.textDecoration='none'">Ver en Eventos →</a>
        `;
        mensajesDiv.appendChild(div);
    }

    function mostrarTyping() {
        const id = 'typing-' + Date.now();
        const div = document.createElement('div');
        div.id = id;
        div.className = 'mensaje claude';
        div.innerHTML = `
            <div class="mensaje-burbuja" style="padding:10px 14px;">
                <div class="typing-dots">
                    <span></span><span></span><span></span>
                </div>
            </div>`;
        mensajesDiv.appendChild(div);
        scrollAlFinal();
        return id;
    }

    function quitarTyping(id) { const el = document.getElementById(id); if (el) el.remove(); }

    function mostrarChatActivo() {
        chatPlaceholder.style.display = 'none';
        chatActivo.style.display = 'flex';
        mensajesDiv.innerHTML = '';
    }

    function ocultarChat() {
        chatActivo.style.display = 'none';
        chatPlaceholder.style.display = 'flex';
        mensajesDiv.innerHTML = '';
        adjuntosPanelWrapper.style.display = 'none';
        adjuntosPanel.style.display = 'none';
        adjuntosLista.innerHTML = '';
        clipBtn.disabled = true;
        limpiarPendingFiles();
    }

    function scrollAlFinal() { mensajesDiv.scrollTop = mensajesDiv.scrollHeight; }

    function setBloqueado(b) {
        enviarBtn.disabled = b;
        mensajeInput.disabled = b;
        clipBtn.disabled = b || !eventoIdActivo;
        enviarBtn.innerHTML = b
            ? '<div class="spinner"></div>'
            : `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>`;
    }

    // ── Ficheros pendientes (multi-fichero) ───────────────────────────────────
    clipBtn.addEventListener('click', () => {
        if (!eventoIdActivo) return;
        fileInputContexto.value = '';
        fileInputContexto.click();
    });

    fileInputContexto.addEventListener('change', () => {
        const files = Array.from(fileInputContexto.files);
        files.forEach(file => pendingFiles.push(file));
        fileInputContexto.value = ''; // Reset para poder volver a seleccionar los mismos ficheros
        renderPendingFiles();
        mensajeInput.focus();
    });

    function renderPendingFiles() {
        pendingFilesContainer.innerHTML = '';
        if (pendingFiles.length === 0) {
            pendingFilesContainer.style.display = 'none';
            return;
        }
        pendingFilesContainer.style.display = 'flex';
        pendingFiles.forEach((file, idx) => {
            const chip = document.createElement('div');
            chip.className = 'pending-chip';
            chip.innerHTML = `
                <span>${esPdf(file.type) ? '📄' : '🖼'}</span>
                <span class="pending-chip-nombre">${escapeHtml(file.name)}</span>
                <button class="pending-chip-clear" type="button" title="Quitar">&times;</button>`;
            chip.querySelector('.pending-chip-clear').addEventListener('click', () => {
                pendingFiles.splice(idx, 1);
                renderPendingFiles();
            });
            pendingFilesContainer.appendChild(chip);
        });
    }

    function limpiarPendingFiles() {
        pendingFiles = [];
        renderPendingFiles();
        fileInputContexto.value = '';
    }

    // ── Indicador de procesamiento de imágenes ─────────────────────────────────
    function mostrarProcesando(cantidad) {
        const id = 'procesando-' + Date.now();
        const div = document.createElement('div');
        div.id = id;
        div.className = 'procesando-indicator';
        const txt = cantidad > 1 ? `Procesando ${cantidad} imágenes...` : 'Procesando imagen...';
        div.innerHTML = `<div class="spinner"></div> ${txt}`;
        mensajesDiv.appendChild(div);
        return id;
    }

    function quitarProcesando(id) {
        if (id) { const el = document.getElementById(id); if (el) el.remove(); }
    }

    // ── Contador y panel de adjuntos del evento ────────────────────────────────
    adjuntosContadorBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        const abierto = adjuntosPanel.style.display !== 'none';
        adjuntosPanel.style.display = abierto ? 'none' : 'block';
    });

    // Cerrar panel al hacer click fuera
    document.addEventListener('click', (e) => {
        if (!adjuntosPanelWrapper.contains(e.target)) {
            adjuntosPanel.style.display = 'none';
        }
    });

    async function cargarAdjuntosEvento(idEvento) {
        try {
            const adjuntos = await fetchJson(`/api/v1/eventos/${idEvento}/adjuntos`);
            renderAdjuntosEnPanel(adjuntos);
        } catch (_) {
            // No interrumpir el flujo principal si falla la carga de adjuntos
        }
    }

    function renderAdjuntosEnPanel(adjuntos) {
        // Actualizar contador
        adjuntosCount.textContent = adjuntos.length;
        adjuntosPanelWrapper.style.display = 'block';

        // Rellenar panel
        adjuntosLista.innerHTML = '';
        if (adjuntos.length === 0) {
            adjuntosLista.innerHTML = '<div class="adjuntos-panel-vacio">Sin ficheros adjuntos</div>';
            return;
        }
        adjuntos.forEach(adj => {
            const item = document.createElement('div');
            item.className = 'adjunto-item';
            const icono = esPdf(adj.tipoMime)
                ? '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>'
                : '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>';
            item.innerHTML = `
                <span class="adjunto-icono">${icono}</span>
                <span class="adjunto-nombre">
                    <a href="/api/v1/ficheros?ruta=${encodeURIComponent(adj.rutaFichero)}"
                       target="_blank" rel="noopener noreferrer"
                       title="${escapeHtml(adj.nombreFichero)}">${escapeHtml(adj.nombreFichero)}</a>
                </span>
                <button class="btn-eliminar-adjunto" data-id="${adj.id}" title="Eliminar adjunto">&times;</button>
            `;
            item.querySelector('.btn-eliminar-adjunto').addEventListener('click', async (e) => {
                const adjId = e.currentTarget.dataset.id;
                try {
                    // contexto=mensaje: solo desasocia del mensaje;
                    // el registro y el fichero se borran solo si no quedan más referencias.
                    await fetchDelete(`/api/v1/adjuntos/${adjId}?contexto=mensaje`);
                    await cargarAdjuntosEvento(eventoIdActivo);
                } catch (err) {
                    mostrarToast('Error al eliminar el adjunto: ' + err.message);
                }
            });
            adjuntosLista.appendChild(item);
        });
    }

    // ── Modal nuevo evento ─────────────────────────────────────────────────────
    nuevoEventoBtn.addEventListener('click', () => {
        document.getElementById('eventoNombre').value = '';
        document.getElementById('eventoFecha').value = '';
        document.getElementById('eventoDescripcion').value = '';
        document.getElementById('modalNuevoEvento').style.display = 'flex';
        document.getElementById('eventoNombre').focus();
    });

    document.getElementById('cancelarEvento').addEventListener('click', () => {
        document.getElementById('modalNuevoEvento').style.display = 'none';
    });

    document.getElementById('modalNuevoEvento').addEventListener('click', e => {
        if (e.target === document.getElementById('modalNuevoEvento')) {
            document.getElementById('modalNuevoEvento').style.display = 'none';
        }
    });

    document.getElementById('crearEvento').addEventListener('click', async () => {
        const nombre = document.getElementById('eventoNombre').value.trim();
        if (!nombre) { mostrarToast('El nombre del evento es obligatorio'); return; }

        const body = { clienteId: clienteIdActivo, nombre, estado: 'ACTIVO' };
        const fecha = document.getElementById('eventoFecha').value;
        const desc  = document.getElementById('eventoDescripcion').value.trim();
        if (fecha) body.fechaEvento = fecha;
        if (desc)  body.descripcion = desc;

        try {
            const evento = await fetchJson('/api/v1/eventos', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });

            const opt = document.createElement('option');
            opt.value = evento.id;
            opt.textContent = evento.nombre + (evento.fechaEvento ? ` (${evento.fechaEvento})` : '');
            eventoSelect.appendChild(opt);
            eventoSelect.value = evento.id;
            eventoSelect.dispatchEvent(new Event('change'));

            document.getElementById('modalNuevoEvento').style.display = 'none';
            mostrarToast('Evento "' + evento.nombre + '" creado');
        } catch (err) {
            mostrarToast('Error al crear el evento: ' + err.message);
        }
    });

    // ── Modal editar evento ────────────────────────────────────────────────────
    editarEventoBtn.addEventListener('click', () => {
        if (!eventoActivo) return;
        document.getElementById('editNombre').value = eventoActivo.nombre || '';
        document.getElementById('editFecha').value = eventoActivo.fechaEvento || '';
        document.getElementById('editDescripcion').value = eventoActivo.descripcion || '';
        document.getElementById('modalEditarEvento').style.display = 'flex';
        document.getElementById('editNombre').focus();
    });

    document.getElementById('cancelarEditar').addEventListener('click', () => {
        document.getElementById('modalEditarEvento').style.display = 'none';
    });

    document.getElementById('modalEditarEvento').addEventListener('click', e => {
        if (e.target === document.getElementById('modalEditarEvento')) {
            document.getElementById('modalEditarEvento').style.display = 'none';
        }
    });

    document.getElementById('guardarEditar').addEventListener('click', async () => {
        const nombre = document.getElementById('editNombre').value.trim();
        if (!nombre) { mostrarToast('El nombre del evento es obligatorio'); return; }

        const body = { clienteId: clienteIdActivo, nombre };
        const fecha = document.getElementById('editFecha').value;
        const desc  = document.getElementById('editDescripcion').value.trim();
        if (fecha) body.fechaEvento = fecha;
        if (desc)  body.descripcion = desc;

        try {
            const eventoActualizado = await fetchJson(`/api/v1/eventos/${eventoIdActivo}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });

            eventoActivo = eventoActualizado;

            // Actualizar el texto de la opción en el selector
            const opt = eventoSelect.querySelector(`option[value="${eventoIdActivo}"]`);
            if (opt) {
                opt.textContent = eventoActualizado.nombre
                    + (eventoActualizado.fechaEvento ? ` (${eventoActualizado.fechaEvento})` : '');
            }

            document.getElementById('modalEditarEvento').style.display = 'none';
            mostrarToast('Evento actualizado correctamente');
        } catch (err) {
            mostrarToast('Error al actualizar el evento: ' + err.message);
        }
    });

    // ── Utilidades ─────────────────────────────────────────────────────────────
    async function fetchJson(url, options = {}) {
        const res = await fetch(url, options);
        if (!res.ok) {
            const err = await res.json().catch(() => ({ mensaje: res.statusText }));
            throw new Error(err.mensaje || res.statusText);
        }
        return res.json();
    }

    async function fetchMultipart(url, formData) {
        const res = await fetch(url, { method: 'POST', body: formData });
        if (!res.ok) {
            const err = await res.json().catch(() => ({ mensaje: res.statusText }));
            throw new Error(err.mensaje || res.statusText);
        }
        return res.json();
    }

    async function fetchDelete(url) {
        const res = await fetch(url, { method: 'DELETE' });
        if (!res.ok && res.status !== 204) {
            const err = await res.json().catch(() => ({ mensaje: res.statusText }));
            throw new Error(err.mensaje || res.statusText);
        }
    }

    function esPdf(mime)     { return mime === 'application/pdf'; }
    function esImagen(mime)  { return !!mime && mime.startsWith('image/'); }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function formatearHora(isoString) {
        try { return new Date(isoString).toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' }); }
        catch { return ''; }
    }

    function mostrarToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('visible');
        setTimeout(() => toast.classList.remove('visible'), 3500);
    }
</script>
</th:block>

</body>
</html>
