<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}"
      lang="es">
<head>
    <title>Community Manager</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<!-- ── Contenido principal ────────────────────────────────────────────────── -->
<div layout:fragment="content" id="spa-root" th:data-initial-panel="${initialPanel}">

    <!-- ═══════════════════════════ PANEL CHAT ══════════════════════════════ -->
    <div id="panel-chat" class="panel">
        <div class="chat-wrapper">

            <!-- Barra superior -->
            <div class="chat-topbar">
                <select id="eventoSelect" disabled>
                    <option value="">— Selecciona un evento —</option>
                </select>
                <button class="btn-nuevo-evento" id="nuevoEventoBtn" style="display:none" type="button">+ Nuevo evento</button>
                <button class="btn-editar-evento-chat" id="editarEventoBtn" style="display:none" type="button">Editar evento</button>
                <span class="topbar-info" id="topbarInfo" style="display:none"></span>
                <div class="adjuntos-panel-wrapper" id="adjuntosPanelWrapper" style="display:none">
                    <button class="btn-adjuntos-contador" id="adjuntosContadorBtn" type="button">
                        📎 <span id="adjuntosCount">0</span> ficheros
                    </button>
                    <div class="adjuntos-panel" id="adjuntosPanel" style="display:none">
                        <div id="adjuntosLista"></div>
                    </div>
                </div>
            </div>

            <!-- Placeholder -->
            <div class="chat-placeholder" id="chatPlaceholder">
                <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                </svg>
                <p id="placeholderTexto">Selecciona un cliente en la barra lateral para comenzar</p>
            </div>

            <!-- Chat activo -->
            <div id="chatActivo" style="display:none; flex:1; flex-direction:column; overflow:hidden;">
                <div id="mensajes"></div>
                <div class="input-area">
                    <div id="pendingFilesContainer"></div>
                    <div class="input-fila">
                        <button id="clipBtn" class="btn-clip" type="button" title="Adjuntar ficheros" disabled>
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                            </svg>
                        </button>
                        <input type="file" id="fileInputContexto" style="display:none" multiple
                               accept=".jpg,.jpeg,.png,.gif,.webp,.pdf,image/jpeg,image/png,image/gif,image/webp,application/pdf">
                        <textarea id="mensajeInput" rows="1" placeholder="Escribe tu petición a Claude..."></textarea>
                        <button id="enviarBtn" type="button" title="Enviar (Enter)">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Modal nuevo evento (chat) -->
            <div class="modal-overlay" id="modalNuevoEvento" style="display:none">
                <div class="modal">
                    <h2>Nuevo evento</h2>
                    <label for="eventoNombre">Nombre *</label>
                    <input type="text" id="eventoNombre" placeholder="Ej: Milonga de verano">
                    <label for="eventoFecha">Fecha del evento</label>
                    <input type="date" id="eventoFecha">
                    <label for="eventoDescripcion">Descripción</label>
                    <textarea id="eventoDescripcion" rows="3" placeholder="Descripción opcional..."></textarea>
                    <div class="modal-actions">
                        <button class="btn-cancelar" id="cancelarEvento">Cancelar</button>
                        <button class="btn-crear" id="crearEvento">Crear evento</button>
                    </div>
                </div>
            </div>

            <!-- Modal editar evento (chat) -->
            <div class="modal-overlay" id="modalEditarEvento" style="display:none">
                <div class="modal">
                    <h2>Editar evento</h2>
                    <label for="editNombre">Nombre *</label>
                    <input type="text" id="editNombre" placeholder="Nombre del evento">
                    <label for="editFecha">Fecha del evento</label>
                    <input type="date" id="editFecha">
                    <label for="editDescripcion">Descripción</label>
                    <textarea id="editDescripcion" rows="3" placeholder="Descripción..."></textarea>
                    <div class="modal-actions">
                        <button class="btn-cancelar" id="cancelarEditar">Cancelar</button>
                        <button class="btn-crear" id="guardarEditar">Guardar cambios</button>
                    </div>
                </div>
            </div>

        </div><!-- /chat-wrapper -->
    </div><!-- /panel-chat -->

    <!-- ═══════════════════════════ PANEL EVENTOS ════════════════════════════ -->
    <div id="panel-eventos" class="panel" style="display:none">
        <div class="eventos-wrapper">

            <!-- Panel izquierdo: lista -->
            <aside class="eventos-list-panel">
                <div class="panel-header">
                    <span class="panel-title">Eventos <span class="sync-dot" id="syncDot"></span></span>
                    <div class="panel-header-actions">
                        <label class="toggle-cerrados" id="evToggleCerradosLabel" style="display:none">
                            <input type="checkbox" id="evMostrarCerradosChk"> Cerrados
                        </label>
                        <button class="btn-nuevo" id="evBtnNuevoEvento" style="display:none" type="button">+ Nuevo</button>
                    </div>
                </div>
                <div class="eventos-list" id="evEventosList">
                    <div class="list-placeholder" id="evListPlaceholder">
                        Selecciona un cliente en la barra lateral para ver sus eventos
                    </div>
                </div>
            </aside>

            <!-- Panel derecho: detalle -->
            <section class="evento-detail-panel" id="evDetailPanel">
                <div class="detail-placeholder" id="evDetailPlaceholder">
                    <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                        <line x1="16" y1="2" x2="16" y2="6"/>
                        <line x1="8" y1="2" x2="8" y2="6"/>
                        <line x1="3" y1="10" x2="21" y2="10"/>
                    </svg>
                    <p>Selecciona un evento para ver sus publicaciones</p>
                </div>
                <div id="evEventoDetail" style="display:none; flex:1; flex-direction:column; overflow:hidden;">
                    <div class="detail-header">
                        <div>
                            <div class="detail-titulo" id="evDetailNombre"></div>
                            <div class="detail-meta" id="evDetailMeta"></div>
                        </div>
                        <div class="detail-header-btns">
                            <button class="btn-editar-evento" id="evBtnEditarEvento" type="button">✎ Editar</button>
                            <button class="btn-abrir-chat" id="evBtnAbrirChat" type="button">
                                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                                </svg>
                                Abrir chat
                            </button>
                        </div>
                    </div>
                    <div class="tabs-bar">
                        <button class="tab-btn active" data-tab="PENDIENTE" type="button">Pendientes <span class="tab-count" id="countPendiente">0</span></button>
                        <button class="tab-btn" data-tab="APROBADA"  type="button">Aprobadas  <span class="tab-count" id="countAprobada">0</span></button>
                        <button class="tab-btn" data-tab="RECHAZADA" type="button">Rechazadas <span class="tab-count" id="countRechazada">0</span></button>
                    </div>
                    <div class="publicaciones-area" id="evPublicacionesArea"></div>
                </div>
            </section>

            <!-- Modal nuevo evento (eventos) -->
            <div class="modal-overlay" id="ev-modalNuevoEvento" style="display:none">
                <div class="modal">
                    <h2>Nuevo evento</h2>
                    <label for="ev-eventoNombre">Nombre *</label>
                    <input type="text" id="ev-eventoNombre" placeholder="Ej: Milonga de verano">
                    <label for="ev-eventoFecha">Fecha del evento</label>
                    <input type="date" id="ev-eventoFecha">
                    <label for="ev-eventoEstado">Estado</label>
                    <select id="ev-eventoEstado">
                        <option value="ACTIVO">Activo</option>
                        <option value="BORRADOR">Borrador</option>
                    </select>
                    <label for="ev-eventoDescripcion">Descripción</label>
                    <textarea id="ev-eventoDescripcion" rows="3" placeholder="Descripción opcional..."></textarea>
                    <div class="modal-actions">
                        <button class="btn-cancelar-modal" id="ev-cancelarEvento">Cancelar</button>
                        <button class="btn-crear-evento"   id="ev-crearEvento">Crear evento</button>
                    </div>
                </div>
            </div>

            <!-- Modal editar evento (eventos) -->
            <div class="modal-overlay" id="ev-modalEditarEvento" style="display:none">
                <div class="modal">
                    <h2>Editar evento</h2>
                    <label for="ev-editNombre">Nombre *</label>
                    <input type="text" id="ev-editNombre" placeholder="Nombre del evento">
                    <label for="ev-editFecha">Fecha del evento</label>
                    <input type="date" id="ev-editFecha">
                    <label for="ev-editEstado">Estado</label>
                    <select id="ev-editEstado">
                        <option value="ACTIVO">Activo</option>
                        <option value="BORRADOR">Borrador</option>
                        <option value="CERRADO">Cerrado (archivar)</option>
                    </select>
                    <label for="ev-editDescripcion">Descripción</label>
                    <textarea id="ev-editDescripcion" rows="3" placeholder="Descripción..."></textarea>
                    <div class="modal-actions">
                        <button class="btn-cancelar-modal" id="ev-cancelarEditar">Cancelar</button>
                        <button class="btn-crear-evento"   id="ev-guardarEditar">Guardar cambios</button>
                    </div>
                </div>
            </div>

            <!-- Modal pedir cambios -->
            <div class="modal-overlay" id="ev-modalFeedback" style="display:none">
                <div class="modal">
                    <h2>Pedir cambios</h2>
                    <label for="ev-feedbackTexto">¿Qué cambios necesitas?</label>
                    <textarea id="ev-feedbackTexto" rows="4" placeholder="Describe los cambios que quieres en esta publicación…"></textarea>
                    <div class="modal-actions">
                        <button class="btn-cancelar-modal" id="ev-cancelarFeedbackModal">Cancelar</button>
                        <button class="btn-crear-evento"   id="ev-confirmarFeedbackModal">Enviar a Claude</button>
                    </div>
                </div>
            </div>

            <!-- Modal programar publicación -->
            <div class="modal-overlay" id="ev-modalPublicar" style="display:none">
                <div class="modal">
                    <h2>Programar publicación</h2>
                    <div id="ev-seccFechasRecomendadas" style="display:none">
                        <p style="font-size:11px;font-weight:700;color:#65676b;text-transform:uppercase;letter-spacing:.4px;margin:0 0 8px;">Momentos recomendados</p>
                        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px" id="ev-fechasChipsContainer"></div>
                    </div>
                    <label for="ev-inputFechaPublicacion">Fecha y hora de publicación</label>
                    <input type="datetime-local" id="ev-inputFechaPublicacion">
                    <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:#1c1e21;cursor:pointer;margin-bottom:12px;user-select:none;font-weight:normal">
                        <input type="checkbox" id="ev-checkInmediato" style="width:15px;height:15px;cursor:pointer;margin:0">
                        Publicar de inmediato
                    </label>
                    <div class="modal-actions">
                        <button class="btn-cancelar-modal" id="ev-cancelarPublicar" type="button">Cancelar</button>
                        <button class="btn-crear-evento"   id="ev-confirmarPublicar" type="button">Publicar</button>
                    </div>
                </div>
            </div>

            <!-- File input para adjuntos de publicación -->
            <input type="file" id="evFileInputAdjunto" style="display:none" accept="image/*" multiple>

        </div><!-- /eventos-wrapper -->
    </div><!-- /panel-eventos -->

    <!-- Toast global -->
    <div id="toast"></div>

</div><!-- /spa-root -->

<!-- ── Scripts ─────────────────────────────────────────────────────────────── -->
<th:block layout:fragment="scripts">
<script th:src="@{/js/app.js}"></script>
</th:block>

</body>
</html>
